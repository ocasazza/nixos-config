# Skip gc-managed runtime state and projected pack content — these are
# gitignored, regenerated by the gc controller, and racing the formatter
# against them caused pre-commit failures.
[global]
excludes = [".gc/**", ".opencode/**"]

[formatter.nix]
command = "nixfmt"
includes = ["*.nix"]

[formatter.shell]
command = "shfmt"
options = ["-i", "2", "-sr", "-s"]
includes = ["*.sh"]

[formatter.prettier]
command = "prettier"
options = ["--write"]
includes = [
  "*.json",
  "*.md",
  "*.yaml",
  "*.yml",
]
excludes = [".github/**"]
