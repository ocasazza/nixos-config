# Trust hierarchy (enforced by key-management flow, NOT by sops itself):
#
#   offline root  --signs-->  admin_* keys  --encrypt/decrypt-->  secrets
#                             host_*  keys  --decrypt at activation-->
#
# The root key lives offline, is never used operationally, and signs admin
# pubkeys out-of-band. Root fingerprint: TBD (offline; not stored here).
# Sops only checks "held private key matches listed public key"; the
# admin/host split is intent, not a cryptographic constraint.
#
# Add a new admin:
#   1. They `age-keygen -o ~/.config/sops/age/keys.txt`, share pubkey OOB.
#   2. Root signs their pubkey (out-of-band, tracked separately).
#   3. Append under the `&admin_<name>` anchor list below.
#   4. `sops updatekeys secrets/*.yaml secrets/*.env` then commit.
#
# Add a new host: `ssh-to-age -i /etc/ssh/ssh_host_ed25519_key.pub`,
# append under `&host_<name>` namespace, same updatekeys dance.
#
# Full rotation procedure (admin compromise, host rebuild, root rotation):
# see secrets/README.md.

keys:
  # Admin keys: humans who can edit any secret. Any single admin suffices.
  - &admin_olive age13qgzftyza90rxfff80z07v8yyt7m26aydmgzqwmpccrs08a3s5pqvd6xxl
  # Host keys: derived from each consumer host's SSH host key via
  # `ssh-to-age`. sops-nix uses the host's default sshKeyPaths
  # (e.g. [ /etc/ssh/ssh_host_ed25519_key ]) to decrypt at activation,
  # no private-key copy required.
  - &host_luna age1jxcqkungt8kyu3mt5apf8xxw883j3pmug6kf0e7yhsas0yalxdwq3k5ufr
  - &host_gn9cflm92k_mbp age1uh7yfce4f6xj0s62ne5tz8r5uj5qk9hr3fy2kz8nptgag9cg4efq00vg7e
creation_rules:
  - path_regex: secrets/opencode\.env$
    age: *admin_olive
  - path_regex: secrets/fleet\.env$
    key_groups:
      - age:
          - *admin_olive
          - *host_gn9cflm92k_mbp
  # Ingestion-pipeline secrets consumed by luna's `local.ingest`, plus
  # Open WebUI's declarative admin-seed/env secrets consumed by
  # `local.openWebUI`. Encrypted to an admin key (for editing from darwin
  # via `sops edit`) and to luna's host key (for in-place decryption at
  # nixos-rebuild activation, no private-key copy).
  - path_regex: secrets/(openwebui-api-token|openwebui-admin-password|openwebui-secret-key|atlassian-email|atlassian-api-token|github-api-token|grafana-admin-password|redis-seaweedfs-password)\.yaml$
    key_groups:
      - age:
          - *admin_olive
          - *host_luna
  # GFR exo federation: bearer token luna presents to the GFR-side
  # authenticated reverse proxy that fronts exo on nodes 02/03. Same
  # admin+host key group as the ingest secrets so luna can decrypt at
  # activation and surface the value into LiteLLM's environment.
  # Design spec: docs/design/gfr-exo-auth-proxy.md.
  - path_regex: secrets/gfr-exo-auth-token\.yaml$
    key_groups:
      - age:
          - *admin_olive
          - *host_luna
  # LiteLLM master key: bearer token clients present to the LiteLLM
  # proxy at :4000. Admin + host_luna key group so luna can decrypt at
  # activation and edits are possible from darwin via `sops edit`.
  # Consumed by `modules/nixos/litellm/` via its `masterKeyFile` option.
  # The decrypted file is a single line `LITELLM_MASTER_KEY=sk-...` so
  # systemd can load it directly via `EnvironmentFile`.
  - path_regex: secrets/litellm-master-key\.yaml$
    key_groups:
      - age:
          - *admin_olive
          - *host_luna
  # Per-client LiteLLM virtual keys. One file per external client
  # (claude-code on nixos, claude-code on darwin, opencode, hermes) so
  # each module reads only its own decrypted EnvironmentFile. Same
  # admin + host_luna group as the master key — luna decrypts at
  # activation, admin rotates from darwin via `sops edit`. File
  # content: a single `LITELLM_API_KEY_<CLIENT>=sk-...` line; placeholder
  # values ship encrypted and are replaced post-rebuild via LiteLLM's
  # `POST /key/generate` API.
  - path_regex: secrets/litellm-key-claude-code-nixos\.yaml$
    key_groups:
      - age:
          - *admin_olive
          - *host_luna
  - path_regex: secrets/litellm-key-claude-code-darwin\.yaml$
    key_groups:
      - age:
          - *admin_olive
          - *host_luna
          - *host_gn9cflm92k_mbp
  - path_regex: secrets/litellm-key-(opencode|hermes)\.yaml$
    key_groups:
      - age:
          - *admin_olive
          - *host_luna
          - *host_gn9cflm92k_mbp
  # LangGraph OCI free-self-hosted stack: Postgres role password
  # consumed by `modules/nixos/langgraph-oci/` via its
  # `postgres.passwordFile` option. Admin + host_luna key group so luna
  # can decrypt at activation and edits are possible from darwin.
  - path_regex: secrets/langgraph-pg-password\.yaml$
    key_groups:
      - age:
          - *admin_olive
          - *host_luna
  # Legacy/unused: kept so an ad-hoc `sops secrets/ingest.env` still
  # encrypts under an admin key, even though luna now reads the four
  # per-token YAMLs above instead of a monolithic env file.
  - path_regex: secrets/ingest\.env$
    age: *admin_olive
