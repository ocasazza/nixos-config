# Trust hierarchy (enforced by key-management flow, NOT by sops itself):
#
#   offline root  --signs-->  admin_* keys  --encrypt/decrypt-->  secrets
#                             host_*  keys  --decrypt at activation-->
#
# The root key lives offline, is never used operationally, and signs admin
# pubkeys out-of-band. Root fingerprint: TBD (offline; not stored here).
# Sops only checks "held private key matches listed public key"; the
# admin/host split is intent, not a cryptographic constraint.
#
# Add a new admin:
#   1. They `age-keygen -o ~/.config/sops/age/keys.txt`, share pubkey OOB.
#   2. Root signs their pubkey (out-of-band, tracked separately).
#   3. Append under the `&admin_<name>` anchor list below.
#   4. `sops updatekeys secrets/*.yaml secrets/*.env` then commit.
#
# Add a new host: `ssh-to-age -i /etc/ssh/ssh_host_ed25519_key.pub`,
# append under `&host_<name>` namespace, same updatekeys dance.
#
# Full rotation procedure (admin compromise, host rebuild, root rotation):
# see secrets/README.md.
#
# This repo is darwin-only. The pdx-nxst-003 NixOS host and its
# service-side secrets (litellm-master-key, openwebui-*, atlassian-*,
# github-api-token, langgraph-pg-password, gfr-exo-auth-token, ...)
# moved to ~/Repositories/schrodinger/nixstation as part of the
# 2026-04-24 split. The remaining secrets here are darwin-side only:
# fleet.env, opencode.env, JuiceFS client creds, and the per-client
# LiteLLM virtual keys (which talk to nixstation's LiteLLM proxy).

keys:
  # Admin keys: humans who can edit any secret. Any single admin suffices.
  - &admin_olive age13qgzftyza90rxfff80z07v8yyt7m26aydmgzqwmpccrs08a3s5pqvd6xxl
  # Host keys: derived from each consumer host's SSH host key via
  # `ssh-to-age`. sops-nix uses the host's default sshKeyPaths
  # (e.g. [ /etc/ssh/ssh_host_ed25519_key ]) to decrypt at activation,
  # no private-key copy required.
  - &host_gn9cflm92k_mbp age1uh7yfce4f6xj0s62ne5tz8r5uj5qk9hr3fy2kz8nptgag9cg4efq00vg7e
  - &host_ck2q9ln7pm_mba age144p4lzmv6r3kphxv3ldmu8rmr2a889zlveck5cnyce9pm8jmdc4qqylgfh
  - &host_gjhc5vvn49_mbp age1u2ks8pg77vmk64tcgv68qrm078s3sd8kze832u8xagmdfant7fksf7zd5r
  - &host_l75t4yhxv7_mba age1qm94uh5hz2ll6d7u4d3lmrtkgkr6k46w7072u4lf2jlfngf3evjsn6q2zm
creation_rules:
  - path_regex: secrets/opencode\.env$
    age: *admin_olive
  - path_regex: secrets/fleet\.env$
    key_groups:
      - age:
          - *admin_olive
          - *host_gn9cflm92k_mbp
          - *host_ck2q9ln7pm_mba
          - *host_gjhc5vvn49_mbp
          - *host_l75t4yhxv7_mba
  # JuiceFS-related secrets (Redis password for metadata KV +
  # SeaweedFS S3 admin secret). The backend runs on
  # pdx-nxst-003 (managed in nixstation); every Mac
  # mounts JuiceFS as a client and needs `META_PASSWORD` (redis) +
  # `--secret-key <admin-secret>` (S3). admin (for editing) + every
  # darwin host_* anchor (so each Mac's darwin-rebuild can surface the
  # secret at activation).
  - path_regex: secrets/(redis-seaweedfs-password|seaweedfs-admin-secret)\.yaml$
    key_groups:
      - age:
          - *admin_olive
          - *host_gn9cflm92k_mbp
          - *host_ck2q9ln7pm_mba
          - *host_gjhc5vvn49_mbp
          - *host_l75t4yhxv7_mba
  # Per-client LiteLLM virtual keys. Each darwin client (claude-code,
  # opencode, hermes) reads its own decrypted EnvironmentFile and
  # presents the key to the LiteLLM proxy on pdx-nxst-001:4000. File
  # content: a single `LITELLM_API_KEY_<CLIENT>=sk-...` line.
  - path_regex: secrets/litellm-key-claude-code-darwin\.yaml$
    key_groups:
      - age:
          - *admin_olive
          - *host_gn9cflm92k_mbp
          - *host_ck2q9ln7pm_mba
          - *host_gjhc5vvn49_mbp
          - *host_l75t4yhxv7_mba
  - path_regex: secrets/litellm-key-opencode-darwin\.yaml$
    key_groups:
      - age:
          - *admin_olive
          - *host_gn9cflm92k_mbp
          - *host_ck2q9ln7pm_mba
          - *host_gjhc5vvn49_mbp
          - *host_l75t4yhxv7_mba
  # Schrodinger Azure OpenAI API key for opencode's `azure` provider
  # (resource: schrodinger-code). Same KEY=value scalar convention as
  # the litellm keys so the existing cut-based source pattern works.
  - path_regex: secrets/azure-api-key-opencode-darwin\.yaml$
    key_groups:
      - age:
          - *admin_olive
          - *host_gn9cflm92k_mbp
          - *host_ck2q9ln7pm_mba
          - *host_gjhc5vvn49_mbp
          - *host_l75t4yhxv7_mba
  - path_regex: secrets/litellm-key-(opencode|hermes)\.yaml$
    key_groups:
      - age:
          - *admin_olive
          - *host_gn9cflm92k_mbp
          - *host_ck2q9ln7pm_mba
          - *host_gjhc5vvn49_mbp
          - *host_l75t4yhxv7_mba
  # TWG (Atlassian Teamwork Graph CLI) authentication. Three secrets needed:
  #   - atlassian-email: Atlassian account email
  #   - atlassian-api-token: API token from Atlassian
  #   - atlassian-site: Site name (e.g., "schrodinger" for schrodinger.atlassian.net)
  # These are used to generate ~/.config/twg/auth.conf declaratively.
  - path_regex: secrets/(atlassian-email|atlassian-api-token|atlassian-site)\.yaml$
    key_groups:
      - age:
          - *admin_olive
          - *host_gn9cflm92k_mbp
          - *host_ck2q9ln7pm_mba
          - *host_gjhc5vvn49_mbp
          - *host_l75t4yhxv7_mba
