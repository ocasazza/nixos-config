[workspace]
provider = "opencode"
install_agent_hooks = ["opencode"]
global_fragments = ["command-glossary", "operational-awareness"]

# Accounting pack — accountant agent + mol-accountant-audit formula.
# Sits in gas town (city scope) and audits other agents' allocation
# efficiency. Distilled rubric in packs/accounting/pack.toml.
[imports.accounting]
source = "packs/accounting"

# schrodinger.oc — four-agent crew (dreamer/planner/implementer/reviewer)
# routed via opencode → LiteLLM → local vLLM. The agents are city-scope
# (see scope = "city" in each agent.toml), so they go through `[imports]`
# rather than a rig include.
[imports.oc]
source = "packs/schrodinger/oc"

[daemon]
patrol_interval = "30s"
max_restarts = 5
restart_window = "1h"
shutdown_timeout = "5s"
